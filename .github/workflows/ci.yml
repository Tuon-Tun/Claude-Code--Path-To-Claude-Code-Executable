name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke test (schema contract, helper scripts, webapp prompt sync)
        run: python knowledge-base/scripts/smoke_test.py
